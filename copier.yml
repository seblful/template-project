_subdirectory: template
_exclude:
  - licenses

project_name:
  type: str
  help: What is your project name?

package_name:
  type: str
  help: What is your Python package name? (snake_case)

author_name:
  type: str
  help: What is the author name?
  default: Aliaksei Chymba

author_email:
  type: str
  help: What is the author email?

current_year:
  type: str
  help: What year should be in the copyright notice?

license:
  type: str
  help: What license should the project use?
  choices:
    - MIT
    - Apache
    - CC0
    - EULA
  default: MIT

python_version:
  type: str
  help: What Python version should the project target?
  default: "3.13"

include_notebooks:
  type: bool
  help: Should notebooks directory be included?
  default: true

_tasks:
  - ["uv", "sync"]
  - ["git", "init"]
