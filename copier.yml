_subdirectory: template

project_name:
  type: str
  help: What is your project name?

package_name:
  type: str
  help: What is your Python package name? (snake_case)

project_description:
  type: str
  help: What is the project description?
  default: A Python project.

author_name:
  type: str
  help: What is the author name?
  default: Aliaksei Chymba

author_email:
  type: str
  help: What is the author email?
  default: alesha.chimba@gmail.com

license:
  type: str
  help: What license should the project use?
  choices:
    - None
    - Apache
    - MIT
    - EULA
  default: None

current_year:
  type: str
  help: What year should be in the copyright notice?
  default: "2026"

python_version:
  type: str
  help: What Python version should the project target?
  default: "3.13"

code_assistant:
  type: str
  help: Which code assistant will you use?
  choices:
    - claude
    - opencode
    - cursor
  default: claude

_exclude:
  - notebooks/.gitkeep
  - scripts/.gitkeep
  - docs/.gitkeep

_tasks:
  - ["git", "init"]
  - ["uv", "sync"]
  - ["uv", "run", "pre-commit", "install"]
  - ["uv", "run", "ruff", "format", "."]
  - ["uv", "run", "mdformat", "."]
